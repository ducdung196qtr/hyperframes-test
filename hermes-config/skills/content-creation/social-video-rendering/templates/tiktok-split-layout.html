<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<!--
  TikTok Split Layout Template — 62% image (top) + 38% text (bottom)
  Deconstructed style: Oswald 700, scanlines, vignette, GSAP slams
  User mandate: images must SHOW alongside text, not as dim backgrounds
  
  Usage:
    1. Replace <img src=""> with local stock photos (copy into render dir)
    2. Replace scene text with actual TTS content
    3. Update DURATION and scene timing from audio analysis (references/audio-sync.md)
    4. window.seekTo() interface for Selenium frame capture
-->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap');
  
  * { margin:0; padding:0; box-sizing:border-box; }
  
  body {
    width: 1080px; height: 1920px; overflow: hidden;
    background: #0a0f1a;
    font-family: 'Oswald', 'Arial Black', sans-serif;
    color: #ffffff;
    position: relative;
  }

  .scene {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    opacity: 0;
    z-index: 10;
  }

  /* Image zone: top 62% */
  .img-zone {
    width: 100%; height: 62%;
    position: relative;
    overflow: hidden;
  }
  .img-zone img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .img-gradient {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, 
      transparent 60%,
      rgba(10,15,26,0.6) 85%,
      #0a0f1a 100%
    );
  }

  /* Text zone: bottom 38% */
  .text-zone {
    width: 100%; height: 38%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding: 25px 55px 30px;
    position: relative; z-index: 2;
    background: #0a0f1a;
  }

  .headline {
    font-size: 82px; font-weight: 700;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.08;
    letter-spacing: -0.01em;
  }
  .headline .gold { color: #FFC300; }
  .headline .red  { color: #E71D36; text-shadow: 0 0 30px rgba(231,29,54,0.4); }
  .headline .cyan { color: #06b6d4; }

  .subtext {
    font-family: 'Helvetica Neue', 'Arial', sans-serif;
    font-size: 28px; font-weight: 300;
    color: rgba(255,255,255,0.7);
    text-align: center;
    line-height: 1.4;
    margin-top: 15px;
    max-width: 800px;
  }

  .badge {
    display: inline-block;
    background: #E71D36;
    color: #fff;
    font-size: 26px; font-weight: 700;
    padding: 12px 30px;
    letter-spacing: 0.15em;
    margin-bottom: 15px;
    box-shadow: 0 0 25px rgba(231,29,54,0.5);
  }

  .stat-big {
    font-size: 140px; font-weight: 700;
    text-align: center;
    line-height: 1;
  }
  .stat-big .gold { color: #FFC300; }
  .stat-big .cyan { color: #06b6d4; }

  .quote-box {
    background: rgba(255,255,255,0.08);
    border-left: 4px solid #FFC300;
    padding: 25px 35px;
    max-width: 850px;
    margin-top: 5px;
  }
  .quote-box p {
    font-family: 'Helvetica Neue', 'Arial', sans-serif;
    font-size: 32px; font-weight: 300;
    font-style: italic;
    line-height: 1.4;
    color: rgba(255,255,255,0.9);
  }
  .quote-box .attr {
    font-size: 22px; font-weight: 400;
    font-style: normal;
    color: #FFC300;
    margin-top: 12px;
    text-align: right;
  }

  .cta-btn {
    display: inline-block;
    background: #FFC300;
    color: #0a0f1a;
    font-size: 34px; font-weight: 700;
    padding: 18px 50px;
    text-decoration: none;
    letter-spacing: 0.05em;
    box-shadow: 0 8px 35px rgba(255,195,0,0.35);
    margin-top: 10px;
  }
  .cta-sub {
    font-family: 'Helvetica Neue', 'Arial', sans-serif;
    font-size: 22px; color: rgba(255,255,255,0.45);
    margin-top: 14px;
  }
  .brand {
    font-size: 26px; color: rgba(255,255,255,0.3);
    letter-spacing: 0.1em;
    margin-top: 25px;
  }

  .scanlines {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,0.05) 3px, rgba(0,0,0,0.05) 4px
    );
    pointer-events: none; z-index: 996;
  }
  .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(10,15,26,0.5) 100%);
    pointer-events: none; z-index: 995;
  }
</style>
</head>
<body>

<div class="scanlines"></div>
<div class="vignette"></div>

<!-- Scene 1: Hook with gold keyword -->
<div class="scene" id="s1">
  <div class="img-zone">
    <img src="photo_scene1.jpg">
    <div class="img-gradient"></div>
  </div>
  <div class="text-zone">
    <div class="headline">
      Setup<br>
      <span class="gold">KEY PHASE</span><br>
      conclusion
    </div>
    <div class="subtext">Context subtitle line</div>
  </div>
</div>

<!-- Scene 2: Twist with red + glitch shake -->
<div class="scene" id="s2">
  <div class="img-zone">
    <img src="photo_scene2.jpg">
    <div class="img-gradient"></div>
  </div>
  <div class="text-zone">
    <div class="headline" style="font-size:95px">
      <span class="red">TWIST</span><br>
      reveal here
    </div>
  </div>
</div>

<!-- Scene 3: BREAKING badge + slam animation -->
<div class="scene" id="s3">
  <div class="img-zone">
    <img src="photo_scene3.jpg">
    <div class="img-gradient"></div>
  </div>
  <div class="text-zone">
    <div class="badge">🔴 BREAKING</div>
    <div class="headline" style="font-size:78px">
      Problem<br>
      <span class="red">CRITICAL</span><br>
      fact revealed
    </div>
    <div class="subtext">One-line explanation</div>
  </div>
</div>

<!-- Scene 4: Stat shock -->
<div class="scene" id="s4">
  <div class="img-zone">
    <img src="photo_scene4.jpg">
    <div class="img-gradient"></div>
  </div>
  <div class="text-zone">
    <div class="stat-big">
      <span class="cyan">XX</span> <span class="gold">KEYWORD</span>
    </div>
    <div class="headline" style="font-size:60px; margin-top:-10px">subtitle</div>
    <div class="subtext">Stat explanation</div>
  </div>
</div>

<!-- Scene 5: Expert quote -->
<div class="scene" id="s5">
  <div class="img-zone">
    <img src="photo_scene5.jpg">
    <div class="img-gradient"></div>
  </div>
  <div class="text-zone">
    <div class="quote-box">
      <p>"Quote text — impactful expert statement."</p>
      <div class="attr">— Source Name</div>
    </div>
  </div>
</div>

<!-- Scene 6: CTA — stays visible at end -->
<div class="scene" id="s6">
  <div class="img-zone">
    <img src="photo_scene6.jpg">
    <div class="img-gradient"></div>
  </div>
  <div class="text-zone">
    <div class="headline" style="font-size:75px">
      Read<br>
      <span class="gold">FULL STORY</span>
    </div>
    <a class="cta-btn" href="https://yourblog.com">READ NOW →</a>
    <div class="cta-sub">yourblog.com</div>
    <div class="brand">BRAND</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
// === REPLACE WITH AUDIO-SYNCED TIMING ===
const DURATION = 12.0;
const tl = gsap.timeline({ paused: true });

gsap.set([s1,s2,s3,s4,s5,s6], { opacity: 0, scale: 1.04 });

// Replace these timings with actual audio analysis output
tl.to(s1, { opacity: 1, scale: 1, duration: 0.4, ease: "power2.out" }, 0.0)
  .to(s1, { opacity: 0, scale: 1.04, duration: 0.3, ease: "power3.in" }, 2.0);

tl.to(s2, { opacity: 1, scale: 1, duration: 0.4, ease: "power2.out" }, 2.7)
  .to(s2, { keyframes: [
    {x:-6,dur:0.04},{x:6,dur:0.04},{x:-4,dur:0.04},{x:4,dur:0.04},{x:0,dur:0.04}
  ]}, 3.7)
  .to(s2, { opacity: 0, scale: 1.04, duration: 0.3, ease: "power3.in" }, 4.6);

tl.to(s3, { opacity: 1, scale: 0.88, duration: 0.04 }, 5.4)
  .to(s3, { opacity: 1, scale: 1, duration: 0.45, ease: "back.out(3)" }, 5.5)
  .to(s3, { opacity: 0, scale: 1.04, duration: 0.3, ease: "power3.in" }, 6.7);

tl.to(s4, { opacity: 1, scale: 0.9, duration: 0.04 }, 6.8)
  .to(s4, { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(2.5)" }, 6.9)
  .to(s4, { opacity: 0, scale: 1.04, duration: 0.3, ease: "power3.in" }, 7.5);

tl.to(s5, { opacity: 1, scale: 1, duration: 0.4, ease: "power3.out" }, 8.4)
  .to(s5, { opacity: 0, scale: 1.04, duration: 0.3, ease: "power3.in" }, 10.7);

tl.to(s6, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(2)" }, 11.5);

// Selenium frame-capture interface — DO NOT REMOVE
window.seekTo = function(t) { tl.progress(Math.min(t / DURATION, 1.0)); };
</script>
</body>
</html>
